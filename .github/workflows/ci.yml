name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install ruff black
      - name: Ruff check
        run: ruff check agents/ pyrit_campaigns/ scripts/ tests/ --ignore E501
      - name: Black check
        run: black --check agents/ pyrit_campaigns/ scripts/ tests/

  test-targets:
    name: Build & health-check Docker targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose -f docker/docker-compose.yml build
      - name: Start containers
        run: docker compose -f docker/docker-compose.yml up -d
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-placeholder' }}
      - name: Wait for targets to be healthy
        run: |
          for port in 8080 8081 8082 8083; do
            for i in $(seq 1 15); do
              curl -sf http://localhost:$port/health && echo "Port $port OK" && break
              echo "Waiting for port $port... ($i/15)"
              sleep 2
            done
          done
      - name: Run target reachability tests
        run: pip install pytest httpx && pytest tests/test_targets_reachable.py -v
      - name: Stop containers
        if: always()
        run: docker compose -f docker/docker-compose.yml down

  dry-run-campaign:
    name: Dry-run agent campaign
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify agent wiring (tools + payloads + MITRE)
        run: |
          python -c "
          from agents.tools.payload_library import PAYLOADS, get_payloads
          from agents.tools.mitre_mapper import ATLAS_TECHNIQUES
          from agents.tools.obsidian_writer import write_finding, write_campaign_report
          assert 'direct_injection' in PAYLOADS, 'direct_injection payloads missing'
          assert 'privesc_tasks' in PAYLOADS, 'privesc_tasks payloads missing'
          assert 'webagent_injection' in PAYLOADS, 'webagent_injection payloads missing'
          assert 'AML.T0054' in ATLAS_TECHNIQUES, 'AML.T0054 missing'
          assert 'AML.T0040' in ATLAS_TECHNIQUES, 'AML.T0040 missing'
          assert hasattr(write_finding, 'name'), 'write_finding not a Tool'
          assert hasattr(write_campaign_report, 'name'), 'write_campaign_report not a Tool'
          print('All wiring checks passed')
          print(f'Payload categories: {list(PAYLOADS.keys())}')
          print(f'MITRE techniques loaded: {len(ATLAS_TECHNIQUES)}')
          "
